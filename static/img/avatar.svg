<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#a371f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>

  <!-- 外圈 -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>

  <!-- 内圈装饰 -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.5" stroke-dasharray="8 4"/>

  <!-- 主文字 "W" -->
  <text x="100" y="128" font-family="SF Mono, Consolas, monospace" font-size="90" font-weight="bold" fill="url(#accent)" text-anchor="middle" filter="url(#glow)">W</text>

  <!-- 代码括号装饰 -->
  <text x="35" y="110" font-family="SF Mono, Consolas, monospace" font-size="24" fill="#58a6ff" opacity="0.6">&lt;</text>
  <text x="155" y="110" font-family="SF Mono, Consolas, monospace" font-size="24" fill="#a371f7" opacity="0.6">/&gt;</text>

  <!-- 底部小点装饰 -->
  <circle cx="80" cy="160" r="3" fill="#58a6ff" opacity="0.6"/>
  <circle cx="100" cy="165" r="2" fill="#a371f7" opacity="0.5"/>
  <circle cx="120" cy="160" r="3" fill="#58a6ff" opacity="0.6"/>
</svg>
